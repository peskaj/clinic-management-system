<div class="stats-container">
  <div class="chart-wrapper">
    <canvas #chartCanvas></canvas>
  </div>

  <div class="stats-summary">
    <div class="summary-card">
      <span class="summary-label">Liczba dekad</span>
      <span class="summary-value">{{ histogram.length }}</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">Łącznie osób</span>
      <span class="summary-value">{{ totalCount }}</span>
    </div>
    @if (histogram.length > 0) {
      <div class="summary-card">
        <span class="summary-label">Średnia na dekadę</span>
        <span class="summary-value">{{ (totalCount / histogram.length).toFixed(1) }}</span>
      </div>
    }
  </div>
</div>
