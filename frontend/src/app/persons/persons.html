<div class="page-container">
  <form class="form-container" [formGroup]="form" (ngSubmit)="post()">
    <mat-form-field appearance="outline">
      <mat-label>Imię</mat-label>
      <input matInput formControlName="firstname" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Nazwisko</mat-label>
      <input matInput formControlName="lastname" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" />
      @if (form.get('email')?.errors?.['email']) {
        <mat-error>Nieprawidłowy format email</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Data urodzenia</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="birthdate" />
      <mat-datepicker-toggle matIconSuffix [for]="picker" />
      <mat-datepicker #picker />
    </mat-form-field>

    @if (editingId === null) {
      <button mat-flat-button type="submit" [disabled]="form.invalid">Dodaj</button>
    } @else {
      <div class="form-actions">
        <button mat-flat-button type="button" color="primary" [disabled]="form.invalid" (click)="modify()">Modyfikuj</button>
        <button mat-flat-button type="button" class="btn-delete" (click)="delete()">Usuń</button>
        <button mat-stroked-button type="button" (click)="cancel()">Anuluj</button>
      </div>
    }
  </form>

  <div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" class="persons-table mat-elevation-z2">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let p">{{ p.id }}</td>
    </ng-container>

    <ng-container matColumnDef="firstname">
      <th mat-header-cell *matHeaderCellDef>Imię</th>
      <td mat-cell *matCellDef="let p">{{ p.firstname }}</td>
    </ng-container>

    <ng-container matColumnDef="lastname">
      <th mat-header-cell *matHeaderCellDef>Nazwisko</th>
      <td mat-cell *matCellDef="let p">{{ p.lastname }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let p">{{ p.email }}</td>
    </ng-container>

    <ng-container matColumnDef="birthdate">
      <th mat-header-cell *matHeaderCellDef>Data ur.</th>
      <td mat-cell *matCellDef="let p">{{ p.birthdate }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"
        (click)="selectRow(row)"
        [class.row-editing]="row.id === editingId"></tr>
  </table>
  </div>
</div>
