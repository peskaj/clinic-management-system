<div class="doctors-container" style="padding: 20px;">
    <h2>Personel Medyczny</h2>
    
    <form [formGroup]="doctorForm" (ngSubmit)="onSubmit()" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
        
        <mat-form-field appearance="outline">
            <mat-label>Imię</mat-label>
            <input matInput formControlName="firstname" placeholder="Np. Anna">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Nazwisko</mat-label>
            <input matInput formControlName="lastname" placeholder="Np. Nowak">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Specjalizacja</mat-label>
            <input matInput formControlName="specialization" placeholder="Np. Kardiolog">
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="doctorForm.invalid" style="height: 56px; margin-bottom: 22px;">
            <mat-icon>person_add</mat-icon>
            Dodaj Lekarza
        </button>
    </form>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <ng-container matColumnDef="firstname">
            <th mat-header-cell *matHeaderCellDef> Imię </th>
            <td mat-cell *matCellDef="let element"> {{element.firstname}} </td>
        </ng-container>

        <ng-container matColumnDef="lastname">
            <th mat-header-cell *matHeaderCellDef> Nazwisko </th>
            <td mat-cell *matCellDef="let element"> {{element.lastname}} </td>
        </ng-container>

        <ng-container matColumnDef="specialization">
            <th mat-header-cell *matHeaderCellDef> Specjalizacja </th>
            <td mat-cell *matCellDef="let element"> {{element.specialization}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
