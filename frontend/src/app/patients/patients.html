<div class="patients-container" style="padding: 20px;">
    <h2>Rejestr Pacjentów</h2>
    
    <form [formGroup]="patientForm" (ngSubmit)="onSubmit()" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 20px;">
        
        <mat-form-field appearance="outline">
            <mat-label>Imię</mat-label>
            <input matInput formControlName="firstname">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Nazwisko</mat-label>
            <input matInput formControlName="lastname">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>PESEL</mat-label>
            <input matInput formControlName="pesel" maxlength="11">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Telefon</mat-label>
            <input matInput formControlName="phone">
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" [disabled]="patientForm.invalid" style="height: 56px; margin-bottom: 22px;">
            <mat-icon>person_add</mat-icon>
            Dodaj Pacjenta
        </button>
    </form>

    <input type="file" #fileInput (change)="onFileSelected($event)" accept=".json,.csv" style="display: none;">
    <button mat-stroked-button type="button" (click)="fileInput.click()" style="height: 56px; margin-bottom: 22px;">
        <mat-icon>upload_file</mat-icon>
        Importuj z pliku (JSON/CSV)
    </button>

    <div class="table-container mat-elevation-z8" style="width: 100%;">
        <table mat-table [dataSource]="dataSource" style="width: 100%;">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID </th>
                <td mat-cell *matCellDef="let element"> {{element.id}} </td>
            </ng-container>

            <ng-container matColumnDef="firstname">
                <th mat-header-cell *matHeaderCellDef> Imię </th>
                <td mat-cell *matCellDef="let element"> {{element.firstname}} </td>
            </ng-container>

            <ng-container matColumnDef="lastname">
                <th mat-header-cell *matHeaderCellDef> Nazwisko </th>
                <td mat-cell *matCellDef="let element"> {{element.lastname}} </td>
            </ng-container>

            <ng-container matColumnDef="pesel">
                <th mat-header-cell *matHeaderCellDef> PESEL </th>
                <td mat-cell *matCellDef="let element"> {{element.pesel}} </td>
            </ng-container>

            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef> Telefon </th>
                <td mat-cell *matCellDef="let element"> {{element.phone}} </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef style="width: 80px; text-align: center;"> Raport </th>
                <td mat-cell *matCellDef="let element" style="text-align: center;">
                    <button mat-icon-button color="warn" (click)="generatePdf(element)" title="Pobierz historię wizyt w PDF">
                        <mat-icon>picture_as_pdf</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
    
    <mat-paginator #paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons class="mat-elevation-z8" style="margin-bottom: 20px;">
    </mat-paginator>
</div>
